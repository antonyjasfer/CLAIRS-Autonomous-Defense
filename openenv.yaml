version: "1.0"
name: "clairs-network-defense"
description: "Autonomous Defense Environment for IoT Networks. The agent must monitor telemetry and mitigate DDoS botnets in real-time."
author: "Meta Vision"
tags: ["cybersecurity", "networking", "ddos-mitigation", "iot"]

# These are the 3 mandatory tasks the bot will test your AI against
tasks:
  - id: "task_1_easy"
    name: "Normal Traffic Handling"
    description: "The agent must monitor normal IoT network traffic without triggering false positive rate limits or blocks."
    difficulty: "easy"

  - id: "task_2_medium"
    name: "Volumetric DDoS Mitigation"
    description: "The agent must detect and successfully block a massive volumetric flood attack (high CPU, high packet rate)."
    difficulty: "medium"

  - id: "task_3_hard"
    name: "Stealth DDoS Mitigation"
    description: "The agent must detect and block a stealth attack designed to bypass basic thresholds (low CPU, high packet rate)."
    difficulty: "hard"
